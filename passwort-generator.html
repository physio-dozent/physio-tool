<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Passwort-Hash-Generator</title>
<style>
body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f5f1ea; color: #1c1a17; }
h1 { font-size: 22px; margin-bottom: 16px; }
p { line-height: 1.6; margin-bottom: 14px; }
input { width: 100%; padding: 10px; font-size: 15px; border: 1px solid #d8d2c4; border-radius: 6px; box-sizing: border-box; }
button { background: #a8431e; color: #fffcf6; border: none; padding: 10px 20px; border-radius: 6px; font-size: 15px; cursor: pointer; margin-top: 12px; }
.result { margin-top: 18px; padding: 14px; background: #fffcf6; border: 1px solid #d8d2c4; border-radius: 6px; word-break: break-all; font-family: monospace; font-size: 14px; }
.label { font-size: 12px; color: #8a857a; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.hidden { display: none; }
</style>
</head>
<body>
<h1>Dashboard-Passwort: Hash erzeugen</h1>
<p>Gib dein neues Passwort ein und kopiere den erzeugten Hash. Trage ihn dann in <code>dashboard.html</code> in der Zeile <code>const DOCENT_PW_HASH = '…'</code> ein.</p>

<input type="text" id="pw" placeholder="Neues Passwort">
<button onclick="gen()">Hash erzeugen</button>

<div id="out" class="hidden">
  <div class="label" style="margin-top:18px;">SHA-256-Hash</div>
  <div class="result" id="hash"></div>
</div>

<script>
async function gen() {
  const pw = document.getElementById('pw').value;
  if (!pw) return alert('Bitte ein Passwort eingeben.');
  const buf = new TextEncoder().encode(pw);
  const h = await crypto.subtle.digest('SHA-256', buf);
  const hex = Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('');
  document.getElementById('hash').textContent = hex;
  document.getElementById('out').classList.remove('hidden');
}
</script>
</body>
</html>
